<!DOCTYPE html>
<html>

<head>
<title>Instagram Profile Editor</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="container">

<!-- LEFT CONTROL PANEL -->

<div class="editor">

<h2>Profile Editor</h2>

<h3>Profile Info</h3>

<label>Username</label>
<input id="usernameInput">

<label>Posts</label>
<input id="postsInput" type="number">

<label>Followers</label>
<input id="followersInput" type="number">

<label>Following</label>
<input id="followingInput" type="number">

<label>Profile Photo</label>
<input type="file" id="profileUpload">

<button onclick="updateProfile()">Update Profile</button>

<hr>

<h3>Icons Editor</h3>

<label>Home Icon</label>
<input type="file" id="homeIconUpload">

<label>Search Icon</label>
<input type="file" id="searchIconUpload">

<label>Reels Icon</label>
<input type="file" id="reelsIconUpload">

<label>Profile Icon</label>
<input type="file" id="profileIconUpload">

<hr>

<h3>Layout Settings</h3>

<label>Phone Width</label>
<input id="phoneWidth" type="number" value="360">

<label>Phone Height</label>
<input id="phoneHeight" type="number" value="720">

<button onclick="updatePhoneSize()">Update Phone Size</button>

<hr>

<h3>Visibility</h3>

<button onclick="toggleNavbar()">Hide / Show Navbar</button>

<button onclick="toggleStats()">Hide / Show Stats</button>

<button onclick="toggleProfile()">Hide / Show Profile</button>

</div>



<!-- RIGHT PREVIEW -->

<div class="preview">

<div class="phone" id="phone">

<div class="phone-content">

<div class="header">

<span id="username">jay_0025</span>

</div>


<div class="profile-section">

<img id="profilePic" src="https://i.imgur.com/V5KpYwS.png">

<div class="stats">

<div>
<span id="posts">0</span>
<p>posts</p>
</div>

<div>
<span id="followers">175</span>
<p>followers</p>
</div>

<div>
<span id="following">51</span>
<p>following</p>
</div>

</div>

</div>


<div class="buttons">

<button>Edit profile</button>

<button>View archive</button>

</div>


<div class="new-story">

<div class="add-story">+</div>
<p>New</p>

</div>


<hr>


<div class="tabs">

<i data-lucide="grid"></i>
<i data-lucide="bookmark"></i>
<i data-lucide="camera"></i>

</div>


<div class="empty">

<div class="camera-icon">
<i data-lucide="camera"></i>
</div>

<h2>Share Photos</h2>

<p>When you share photos, they will appear on your profile.</p>

<a href="#">Share your first photo</a>

</div>

</div>


<!-- NAVBAR -->

<div class="navbar" id="navbar">

<i data-lucide="home"></i>
<i data-lucide="search"></i>
<i data-lucide="plus-square"></i>
<i data-lucide="clapperboard"></i>
<i data-lucide="user"></i>

</div>


</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
